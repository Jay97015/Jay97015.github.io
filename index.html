<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jay | Data Engineering Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-base: #060913;
            --surface-card: rgba(15, 23, 42, 0.6);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --glow-cyan: #06b6d4;
            --glow-emerald: #10b981;
            --border-line: rgba(255, 255, 255, 0.05);
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-base);
            /* Grid and subtle ambient background circles */
            background-image: 
                radial-gradient(circle at 0% 0%, rgba(6, 182, 212, 0.12) 0%, transparent 50%),
                radial-gradient(circle at 100% 100%, rgba(16, 185, 129, 0.08) 0%, transparent 50%),
                linear-gradient(rgba(255, 255, 255, 0.005) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.005) 1px, transparent 1px);
            background-size: 100% 100%, 100% 100%, 40px 40px, 40px 40px;
            background-attachment: fixed;
            color: var(--text-primary);
            margin: 0;
            padding: 0;
        }

        /* Large Hero Landing Section */
        .hero-section {
            min-height: 70vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            max-width: 900px;
            margin: 0 auto;
            padding: 0 2rem;
        }

        .hero-section .mono-tag {
            font-family: 'JetBrains Mono', monospace;
            color: var(--glow-emerald);
            font-size: 1rem;
            letter-spacing: 0.2em;
            margin-bottom: 1rem;
        }

        .hero-section h1 {
            font-size: 4rem;
            font-weight: 700;
            margin: 0;
            letter-spacing: -0.05em;
            background: linear-gradient(135deg, var(--text-primary) 30%, var(--text-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero-section p {
            font-size: 1.3rem;
            color: var(--text-secondary);
            line-height: 1.6;
            max-width: 650px;
            margin: 1.5rem 0 2.5rem 0;
        }

        /* Long Form Content Layout */
        .content-container {
            max-width: 900px;
            margin: 0 auto;
            padding: 0 2rem 10rem 2rem;
        }

        /* Spaced Out Rows/Sections */
        .page-section {
            padding: 6rem 0;
            border-top: 1px solid var(--border-line);
        }

        .section-header {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            color: var(--glow-cyan);
            margin-bottom: 3rem;
        }

        /* Deep Dive Workflow Blocks */
        .workflow-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 2rem;
        }

        .workflow-step {
            background: rgba(255, 255, 255, 0.01);
            border: 1px solid var(--border-line);
            border-radius: 16px;
            padding: 2rem;
        }

        .workflow-step h3 {
            margin: 0 0 0.5rem 0;
            font-size: 1.2rem;
            color: var(--text-primary);
        }

        .workflow-step p {
            margin: 0;
            color: var(--text-secondary);
            font-size: 0.95rem;
            line-height: 1.6;
        }

        /* Continuous Stacked Grid for Repositories */
        .project-stack {
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .project-card {
            background-color: var(--surface-card);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-line);
            border-radius: 20px;
            padding: 2.5rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .project-card:hover {
            transform: translateY(-4px);
            border-color: rgba(6, 182, 212, 0.3);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        .project-meta h3 {
            margin: 0 0 0.5rem 0;
            font-size: 1.6rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            text-transform: capitalize;
        }

        .project-meta p {
            color: var(--text-secondary);
            font-size: 1.05rem;
            line-height: 1.6;
            margin: 0;
        }

        .btn {
            font-family: 'JetBrains Mono', monospace;
            align-self: flex-start;
            background: rgba(255, 255, 255, 0.03);
            color: var(--text-primary);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 0.7rem 1.5rem;
            border-radius: 8px;
            text-decoration: none;
            font-size: 0.85rem;
            transition: all 0.2s ease;
        }

        .btn:hover {
            background: var(--text-primary);
            color: var(--bg-base);
            border-color: var(--text-primary);
        }
    </style>
</head>
<body>

    <header class="hero-section">
        <div class="mono-tag">// CURRENT STATUS: ARCHITECTING SYSTEM LOGS</div>
        <h1>Jay's Ecosystem</h1>
        <p>
            A dedicated data environment focused on engineering clean analytics pipelines, 
            structuring precise relational business queries, and building optimized search architectures.
        </p>
    </header>

    <div class="content-container">

        <section class="page-section">
            <div class="section-header">01 / Operational Methodologies</div>
            <div class="workflow-grid">
                <div class="workflow-step">
